<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no" spellcheck="false">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->

  <style>
    /* Splash Screen CSS Keyframe Animations */
    .crs-splash-outer-circle {
      animation: outer-circle ease 6s infinite;
      stroke: #8082ff;
    }
    .crs-splash-outer-circle-up {
      animation: outer-circle-up ease 6s infinite;
      stroke: #abf263;
    }
    .crs-splash-inner-circle {
      animation: inner-circle ease 6s infinite;
      stroke: #ff668f;
    }
    .crs-splash-inner-circle-up {
      animation: inner-circle-up ease 6s infinite;
      stroke: #047857;
    }
    .crs-splash-outer-circle,
    .crs-splash-outer-circle-up,
    .crs-splash-inner-circle,
    .crs-splash-inner-circle-up {
      transform-origin: center center;
      stroke-linecap: round;
      stroke-dasharray: 1400;
      stroke-width: 16;
    }
    @keyframes inner-circle {
      0% { stroke-dashoffset: 1399; transform: rotate(330deg); }
      35% { stroke-dashoffset: 1358; transform: rotate(756deg); }
      52% { stroke-dashoffset: 1358; transform: rotate(756deg); }
      96% { stroke-dashoffset: 1399; transform: rotate(1050deg); }
      100% { stroke-dashoffset: 1399; transform: rotate(1050deg); }
    }
    @keyframes inner-circle-up {
      0% { stroke-dashoffset: 1399; transform: rotate(330deg); }
      28% { stroke-dashoffset: 1358; transform: rotate(756deg); }
      35% { stroke-dashoffset: 1358; transform: rotate(756deg); }
      52% { stroke-dashoffset: 1358; transform: rotate(755deg); }
      96% { stroke-dashoffset: 1399; transform: rotate(1410deg); }
      100% { stroke-dashoffset: 1399; transform: rotate(1410deg); }
    }
    @keyframes outer-circle-up {
      0% { stroke-dashoffset: 1399; transform: rotate(150deg); }
      28% { stroke-dashoffset: 1150; transform: rotate(-323deg); }
      35% { stroke-dashoffset: 1150; transform: rotate(-323deg); }
      52% { stroke-dashoffset: 1150; transform: rotate(-323deg); }
      88% { stroke-dashoffset: 1399; transform: rotate(-570deg); }
      100% { stroke-dashoffset: 1399; transform: rotate(-570deg); }
    }
    @keyframes outer-circle {
      0% { stroke-dashoffset: 1399; transform: rotate(150deg); }
      35% { stroke-dashoffset: 1150; transform: rotate(-323deg); }
      52% { stroke-dashoffset: 1150; transform: rotate(-323deg); }
      96% { stroke-dashoffset: 1399; transform: rotate(-570deg); }
      100% { stroke-dashoffset: 1399; transform: rotate(-570deg); }
    }

    /* Custom Scrollbar Styling */
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.4);
      border-radius: 9999px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.6);
    }

    /* Selection Prevention */
    .no-select {
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body class="relative w-screen h-screen overflow-hidden no-select bg-slate-900 font-sans text-slate-100">

  <!-- ========================================== -->
  <!--   SPLASH SCREEN                            -->

      <path class="crs-splash-outer-circle" d="M108 58C108 85.6142 85.6142 108 58 108C30.3858 108 8 85.6142 8 58C8 30.3858 30.3858 8 58 8C85.6142 8 108 30.3858 108 58Z" />
      <path class="crs-splash-outer-circle-up" d="M108 58C108 85.6142 85.6142 108 58 108C30.3858 108 8 85.6142 8 58C8 30.3858 30.3858 8 58 8C85.6142 8 108 30.3858 108 58Z" />
      <path class="crs-splash-inner-circle" d="M81 58C81 70.7025 70.7025 81 58 81C45.2975 81 35 70.7025 35 58C35 45.2975 45.2975 35 58 35C70.7025 35 81 45.2975 81 58Z" />
      <path class="crs-splash-inner-circle-up" d="M81 58C81 70.7025 70.7025 81 58 81C45.2975 81 35 70.7025 35 58C35 45.2975 45.2975 35 58 35C70.7025 35 81 45.2975 81 58Z" />

      <button onclick="createWidget('picker')" class="group relative p-2.5 rounded-xl text-slate-400 hover:text-yellow-500 hover:bg-yellow-500/20 transition duration-150">

  <!-- ========================================== -->
  <!--   JAVASCRIPT GAME LOOP & LOGIC            -->
  <!-- ========================================== -->
  <script>
    // --- STATED GLOBALS ---
    let maxZIndex = 10;
    let audioCtx = null;
    let micStream = null;

    const gradients = [
      { name: 'Midnight Aurora', value: 'from-slate-900 via-indigo-950 to-slate-900' },
      { name: 'Warm Classroom', value: 'from-amber-950 via-stone-900 to-amber-950' },
      { name: 'Ocean Depths', value: 'from-cyan-950 via-blue-950 to-slate-950' },
      { name: 'Forest Moss', value: 'from-emerald-950 via-zinc-900 to-green-950' },
      { name: 'Retro Sunset', value: 'from-violet-950 via-fuchsia-950 to-rose-950' },
    ];

    const colors = [
      { name: 'Pure White', value: '#ffffff' },
      { name: 'Soft Cream', value: '#fdfbf7' },
      { name: 'Slate Gray', value: '#1e293b' },
      { name: 'Classic Blackboard', value: '#14532d' },
      { name: 'Deep Burgundy', value: '#4c0519' },
      { name: 'Royal Indigo', value: '#1e1b4b' },
      { name: 'True Dark', value: '#09090b' },
    ];

    const images = [
      { name: 'Abstract Sparks', url: 'https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?auto=format&fit=crop&w=1920&q=80' },
      { name: 'Cozy Library', url: 'https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1920&q=80' },
      { name: 'Bright Bokeh', url: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1920&q=80' },
      { name: 'Chalkboard Texture', url: 'https://images.unsplash.com/photo-1571844307560-f17ab2ec17c2?auto=format&fit=crop&w=1920&q=80' },
      { name: 'Calming Nature', url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1920&q=80' },
    ];

    // Regular Bell Schedule Data matchingRegular regular regular regularRegular bell regular regular
    const bellSchedule = [
      { name: "Homeroom", start: "07:35", end: "07:58", label: "7:35 - 7:58" },
      { name: "1st Period", start: "08:01", end: "08:47", label: "8:01 - 8:47" },
      { name: "2nd Period", start: "08:50", end: "09:36", label: "8:50 - 9:36" },
      { name: "3rd Period", start: "09:39", end: "10:25", label: "9:39 - 10:25" },
      { name: "4th Period", start: "10:28", end: "11:14", label: "10:28 - 11:14" },
      { name: "5th (7th Lunch)", start: "11:17", end: "12:03", label: "11:17 - 12:03" },
      { name: "6th (8th Lunch)", start: "12:06", end: "12:52", label: "12:06 - 12:52" },
      { name: "7th Period", start: "12:55", end: "13:41", label: "12:55 - 1:41" },
      { name: "8th Period", start: "13:44", end: "14:30", label: "1:44 - 2:30" }
    ];

    // --- SOUND SYNTHESIZER ---
    function playBuzzer(type = 'bell') {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx = audioCtx;
        if (type === 'bell') {
          const osc1 = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const gain = ctx.createGain();

          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(880, ctx.currentTime);
          osc2.type = 'triangle';
          osc2.frequency.setValueAtTime(440, ctx.currentTime);

          gain.gain.setValueAtTime(0.5, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2);

          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(ctx.destination);

          osc1.start();
          osc2.start();
          osc1.stop(ctx.currentTime + 1.2);
          osc2.stop(ctx.currentTime + 1.2);
        } else {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(330, ctx.currentTime);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.8);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.8);
        }
      } catch (e) {
        console.warn("Audio Context play blocked by browser interaction restrictions.", e);
      }
    }

    // --- BACKGROUND ENGINE SETUP ---
    let activeBgType = 'gradient';
    let activeBgValue = 'from-indigo-950 via-slate-900 to-blue-950';

    function setBackground(type, value) {
      activeBgType = type;
      activeBgValue = value;

      const bgContainer = document.getElementById('canvas-bg');
      const gridOverlay = document.getElementById('grid-overlay');
      const brandingPill = document.getElementById('branding-pill');
      const themeBtn = document.getElementById('theme-btn');
      const tipPill = document.getElementById('tip-pill');
      const dockBar = document.getElementById('dock-bar');

      // Clear styles/classes
      bgContainer.className = "absolute inset-0 w-full h-full transition-all duration-1000 ease-in-out";
      bgContainer.style.backgroundColor = "";
      bgContainer.style.backgroundImage = "";

      const isWhite = value === '#ffffff' || value === '#fdfbf7';

      if (type === 'color') {
        bgContainer.style.backgroundColor = value;
      } else if (type === 'image') {
        bgContainer.style.backgroundImage = `url(${value})`;
      } else if (type === 'gradient') {
        bgContainer.classList.add('bg-gradient-to-tr', ...value.split(' '));
      }

      // Dynamic theme adaptation (White Background optimizations)
      if (isWhite) {
        gridOverlay.style.backgroundImage = "linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px)";
        
        brandingPill.className = "flex items-center space-x-3 pointer-events-auto backdrop-blur-md border py-1.5 px-4 rounded-full transition-colors duration-300 bg-white/80 border-slate-200 text-slate-800 shadow-sm";
        themeBtn.className = "flex items-center space-x-1.5 border px-3 py-1.5 rounded-lg text-sm transition font-medium shadow-sm bg-white hover:bg-slate-100 border-slate-200 text-slate-700";
        tipPill.className = "text-[11px] px-3 py-1 rounded-full backdrop-blur-sm shadow border transition-colors duration-300 bg-white/80 border-slate-200 text-slate-600 shadow-sm";
        dockBar.className = "flex items-center space-x-1 backdrop-blur-xl border p-2.5 rounded-2xl shadow-2xl overflow-x-auto max-w-full scrollbar-none transition-colors duration-300 bg-white/95 border-slate-200 shadow-slate-300/50";
      } else {
        gridOverlay.style.backgroundImage = "linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px)";

    // --- WIDGET SPAWNING ENGINE ---
    function createWidget(type) {
      const id = `${type}-${Date.now()}`;
      maxZIndex++;

      // Compute initial dimension rules
      let width = 280, height = 240;
      if (type === 'clock') { width = 320; height = 180; }
      if (type === 'timer') { width = 300; height = 260; }
      if (type === 'traffic') { width = 160; height = 300; }
      if (type === 'work') { width = 260; height = 200; }
      if (type === 'note') { width = 350; height = 280; }
      if (type === 'draw') { width = 450; height = 350; }
      if (type === 'dice') { width = 250; height = 200; }
      if (type === 'picker') { width = 300; height = 320; }
      if (type === 'sound') { width = 280; height = 250; }
      if (type === 'qr') { width = 280; height = 300; }
      if (type === 'schedule') { width = 340; height = 320; }

      const randomOffset = Math.floor(Math.random() * 40) - 20;
      const x = Math.max(20, (window.innerWidth / 2) - (width / 2) + randomOffset);
      const y = Math.max(20, (window.innerHeight / 2) - (height / 2) + randomOffset - 40);

      // Create main HTML outer casing wrapper
      const widgetEl = document.createElement('div');
      widgetEl.id = id;
      widgetEl.className = "absolute pointer-events-auto rounded-xl border bg-slate-900/90 backdrop-blur-md shadow-2xl flex flex-col transition-shadow duration-150 group overflow-hidden border-slate-700 shadow-black/40";
      widgetEl.style.width = `${width}px`;
      widgetEl.style.height = `${height}px`;
      widgetEl.style.left = `${x}px`;
      widgetEl.style.top = `${y}px`;
      widgetEl.style.zIndex = maxZIndex;

      // Bring to front interaction
      widgetEl.addEventListener('pointerdown', () => {
        maxZIndex++;
        widgetEl.style.zIndex = maxZIndex;
        
        // Remove border outline from all widgets and append to active
        document.querySelectorAll('.pointer-events-auto').forEach(el => {
          el.classList.add('border-slate-700');
          el.classList.remove('border-indigo-500', 'shadow-indigo-500/20');
        });
        widgetEl.classList.remove('border-slate-700');
        widgetEl.classList.add('border-indigo-500', 'shadow-indigo-500/20');
      });

      // HTML Inner Elements structure
      widgetEl.innerHTML = `
        <!-- Header -->
        <div class="crs-drag-header h-10 px-3 bg-slate-950/80 flex justify-between items-center cursor-move text-slate-300 border-b border-slate-800 select-none">
          <div class="flex items-center space-x-2">
            <i data-lucide="move" class="w-3.5 h-3.5 opacity-60 text-indigo-400"></i>
            <span class="text-xs font-semibold capitalize tracking-wide select-none">${type === 'qr' ? 'QR Code' : type === 'schedule' ? 'Bell Schedule' : type} Tool</span>
          </div>
          <button onclick="closeWidget('${id}')" class="p-1 rounded-full hover:bg-rose-500/20 hover:text-rose-400 transition">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
        </div>
        <!-- Content stage -->
        <div class="widget-stage flex-1 p-3 overflow-y-auto overflow-x-hidden text-white scrollbar-thin">
          ${getWidgetMarkup(type, id)}
        </div>
        <!-- Resizer handle -->
        <div class="crs-resize-handle absolute bottom-0 right-0 w-4 h-4 cursor-se-resize flex items-end justify-end p-0.5">
          <div class="w-2.5 h-2.5 border-r-2 border-b-2 border-slate-500/60 rounded-br"></div>
        </div>
      `;

      document.getElementById('widget-container').appendChild(widgetEl);
      lucide.createIcons();

      // Bind custom interactions for each specific widget
      initializeWidgetInteractions(type, id);

      // Register Drag and Resize Event Hooks
      registerDragActions(widgetEl);
      registerResizeActions(widgetEl, type);
    }

    function closeWidget(id) {
      const el = document.getElementById(id);
      if (el) {
        // Safe microphone release if we are closing a sound analyzer widget
        if (el.dataset.streamId) {
          stopMicrophoneCapture(id);
        }
        el.remove();
      }
    }

    function clearAllWidgets() {
      if (window.confirm("Are you sure you want to clear all tools from the screen?")) {

    // --- DRAG ACTIONS ENGINE ---
    function registerDragActions(widgetEl) {
      const header = widgetEl.querySelector('.crs-drag-header');
      header.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        
        const startX = e.clientX - widgetEl.offsetLeft;
        const startY = e.clientY - widgetEl.offsetTop;

        function onPointerMove(moveEvent) {
          const nextX = Math.min(Math.max(0, moveEvent.clientX - startX), window.innerWidth - 80);
          const nextY = Math.min(Math.max(0, moveEvent.clientY - startY), window.innerHeight - 80);
          widgetEl.style.left = `${nextX}px`;
          widgetEl.style.top = `${nextY}px`;
        }

        function onPointerUp() {
          document.removeEventListener('pointermove', onPointerMove);
          document.removeEventListener('pointerup', onPointerUp);
        }

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
      });
    }

    // --- RESIZE ACTIONS ENGINE ---
    function registerResizeActions(widgetEl, type) {
      const resizer = widgetEl.querySelector('.crs-resize-handle');
      resizer.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();

        const startWidth = widgetEl.offsetWidth;
        const startHeight = widgetEl.offsetHeight;
        const startX = e.clientX;
        const startY = e.clientY;

        function onPointerMove(moveEvent) {
          const newWidth = Math.max(160, startWidth + (moveEvent.clientX - startX));
          const newHeight = Math.max(120, startHeight + (moveEvent.clientY - startY));

          widgetEl.style.width = `${newWidth}px`;
          widgetEl.style.height = `${newHeight}px`;

          // Custom canvas redraw check
          if (type === 'draw') {
            const canvas = widgetEl.querySelector('canvas');
            if (canvas) {
              const ctx = canvas.getContext('2d');
              // Save state
              const tempCanvas = document.createElement('canvas');
              tempCanvas.width = canvas.width;
              tempCanvas.height = canvas.height;
              tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

              // Resize canvas safely
              canvas.width = Math.max(100, newWidth - 24);
              canvas.height = Math.max(80, newHeight - 84);

              // Redraw
              ctx.lineCap = 'round';
              ctx.strokeStyle = canvas.dataset.color || '#abf263';
              ctx.lineWidth = canvas.dataset.brushSize || 4;
              ctx.drawImage(tempCanvas, 0, 0);
            }
          }
        }

        function onPointerUp() {
          document.removeEventListener('pointermove', onPointerMove);
          document.removeEventListener('pointerup', onPointerUp);
        }

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
      });
    }

              <button onclick="toggleMicrophone('${id}')" class="mic-toggle-btn w-full py-1.5 px-3 rounded-lg text-xs font-bold uppercase tracking-wider transition flex justify-center items-center gap-1.5 bg-teal-500 text-slate-950 hover:bg-teal-400">

      }

      if (type === 'qr') {
        return `
          <div class="h-full flex flex-col justify-between">
            <div class="flex-1 flex justify-center items-center p-2 bg-slate-950/50 border border-slate-800 rounded-xl relative overflow-hidden mb-2 min-h-0">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://classroomscreen.com" class="qr-img w-32 h-32 object-contain bg-white p-2 rounded-lg border border-slate-700 shadow-md">
            </div>
            <div class="space-y-1.5">
              <input type="text" value="https://classroomscreen.com" class="qr-input w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-cyan-500" placeholder="Type URL or text...">
              <button onclick="updateQrCode('${id}')" class="w-full bg-cyan-600 hover:bg-cyan-500 py-1 rounded text-xs font-bold uppercase tracking-wider transition text-white">Update QR Code</button>
            </div>
          </div>
        `;
      }

      if (type === 'schedule') {
        return `
          <div class="h-full flex flex-col justify-between text-slate-100">
            <div class="schedule-banner bg-slate-950/60 p-2.5 rounded-lg border border-slate-800 text-center relative overflow-hidden flex flex-col justify-center min-h-[96px] shrink-0 mb-2">
              <div>
                <div class="text-[10px] text-slate-400 font-extrabold uppercase tracking-widest mb-0.5">School Day Over</div>
                <div class="text-sm font-bold text-slate-300">Have a wonderful afternoon!</div>
              </div>
            </div>

            <div class="schedule-list flex-1 overflow-y-auto space-y-1 pr-0.5 scrollbar-thin text-xs">
              <!-- Dynamically rendered and filtered remaining periods -->
            </div>
          </div>
        `;
      }
    }

    // --- INITIALIZE INDIVIDUAL INTERACTIVE MODULES ---
    function initializeWidgetInteractions(type, id) {
      const widget = document.getElementById(id);

      if (type === 'clock') {
        function runClock() {
          const clock = document.getElementById(id);
          if (!clock) return;
          const now = new Date();
          const format = (v) => String(v).padStart(2, '0');
          clock.querySelector('.clock-hrs').innerText = format(now.getHours());
          clock.querySelector('.clock-mins').innerText = format(now.getMinutes());
          clock.querySelector('.clock-secs').innerText = format(now.getSeconds());

          const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
          const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          clock.querySelector('.clock-day').innerText = days[now.getDay()];
          clock.querySelector('.clock-date').innerText = `${months[now.getMonth()]} ${format(now.getDate())}, ${now.getFullYear()}`;
          setTimeout(runClock, 1000);
        }
        runClock();
      }

      if (type === 'timer') {
        widget.dataset.secondsLeft = 300;
        widget.dataset.isActive = "false";
      }

      if (type === 'stopwatch') {
        widget.dataset.time = 0;
        widget.dataset.isActive = "false";
      }

      if (type === 'draw') {
        const canvas = widget.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#abf263';
        ctx.lineWidth = 4;

        canvas.dataset.color = '#abf263';
        canvas.dataset.brushSize = 4;

        let isDrawing = false;

        const getPos = (e) => {
          const rect = canvas.getBoundingClientRect();
          const clientX = e.clientX || (e.touches && e.touches[0].clientX);
          const clientY = e.clientY || (e.touches && e.touches[0].clientY);
          return {
            x: clientX - rect.left,
            y: clientY - rect.top
          };
        };

        const drawStart = (e) => {
          isDrawing = true;
          const pos = getPos(e);
          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y);
        };

        const drawMove = (e) => {
          if (!isDrawing) return;
          if (e.touches) e.preventDefault();
          const pos = getPos(e);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
        };

        const drawEnd = () => {
          ctx.closePath();
          isDrawing = false;
        };

        // Mouse listeners
        canvas.addEventListener('mousedown', drawStart);
        canvas.addEventListener('mousemove', drawMove);
        canvas.addEventListener('mouseup', drawEnd);
        canvas.addEventListener('mouseleave', drawEnd);

        // Touch responsive listeners
        canvas.addEventListener('touchstart', drawStart);
        canvas.addEventListener('touchmove', drawMove, { passive: false });
        canvas.addEventListener('touchend', drawEnd);
      }

      if (type === 'dice') {
        widget.dataset.diceCount = 1;
      }

      if (type === 'schedule') {
        function runScheduleTracker() {
          const schedule = document.getElementById(id);
          if (!schedule) return;

          const now = new Date();
          const currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

          const toSecs = (str) => {
            const [h, m] = str.split(':').map(Number);
            return h * 3600 + m * 60;
          };

          // Find active and next
          let active = null;
          let next = null;
          let timeRemaining = 0;
          let percent = 0;

          for (let i = 0; i < bellSchedule.length; i++) {
            const p = bellSchedule[i];
            const startS = toSecs(p.start);
            const endS = toSecs(p.end);

            if (currentSeconds >= startS && currentSeconds <= endS) {
              active = p;
              timeRemaining = endS - currentSeconds;
              percent = Math.min(100, Math.round(((currentSeconds - startS) / (endS - startS)) * 100));
              break;
            }
          }

          if (!active) {
            next = bellSchedule.find(p => toSecs(p.start) > currentSeconds);
            if (next) {
              timeRemaining = toSecs(next.start) - currentSeconds;
            }
          }

          const formatTimer = (totalSecs) => {
            const h = Math.floor(totalSecs / 3600);
            const m = Math.floor((totalSecs % 3600) / 60);
            const s = totalSecs % 60;
            return (h > 0 ? `${h}h ` : '') + `${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;
          };

          // Update Top Banner Card
          const banner = schedule.querySelector('.schedule-banner');
          if (active) {
            banner.innerHTML = `
              <div>
                <div class="text-[10px] text-emerald-400 font-extrabold uppercase tracking-widest mb-0.5">Current Period</div>
                <div class="text-sm font-bold text-white mb-1">${active.name} (${active.label})</div>
                <div class="text-lg font-mono font-bold text-indigo-300">${formatTimer(timeRemaining)} left</div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full mt-2 overflow-hidden">
                  <div class="bg-indigo-500 h-full rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                </div>
              </div>
            `;
          } else if (next) {
            banner.innerHTML = `
              <div>
                <div class="text-[10px] text-amber-400 font-extrabold uppercase tracking-widest mb-0.5">Passing Time / Next Class</div>
                <div class="text-sm font-semibold text-slate-200 mb-1">Get ready for ${next.name}</div>
                <div class="text-lg font-mono font-bold text-amber-300">Starts in ${formatTimer(timeRemaining)}</div>
              </div>
            `;
          } else {
            banner.innerHTML = `
              <div>
                <div class="text-[10px] text-slate-400 font-extrabold uppercase tracking-widest mb-0.5">School Day Over</div>
                <div class="text-sm font-bold text-slate-300">Have a wonderful afternoon!</div>
              </div>
            `;
          }

          // Filter Remaining Periods and redraw list
          const list = schedule.querySelector('.schedule-list');
          const remaining = bellSchedule.filter(p => toSecs(p.end) >= currentSeconds);
          
          list.innerHTML = "";
          if (remaining.length > 0) {
            remaining.forEach(p => {
              const isActivePeriod = active && active.name === p.name;
              const bgClass = isActivePeriod 
                ? 'bg-indigo-600/30 border-indigo-500/80 text-white font-semibold' 
                : 'bg-slate-950/30 border-slate-900 text-slate-300 hover:bg-slate-950/50';

              list.innerHTML += `
                <div class="flex justify-between items-center px-2.5 py-1.5 rounded border transition-colors duration-150 ${bgClass}">
                  <div class="flex items-center space-x-2">
                    ${isActivePeriod ? `
                      <span class="flex h-1.5 w-1.5 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-indigo-500"></span>
                      </span>` : ''}
                    <span>${p.name}</span>
                  </div>
                  <span class="font-mono text-[10px] opacity-90">${p.label}</span>
                </div>
              `;
            });
          } else {
            list.innerHTML = `<div class="text-center text-slate-500 text-[11px] py-4">No periods remaining today.</div>`;
          }

          setTimeout(runScheduleTracker, 1000);
        }
        runScheduleTracker();
      }
    }

    // --- COUNTDOWN TIMER ACTIONS ---
    function adjustTimer(id, seconds) {
      const widget = document.getElementById(id);
      let left = parseInt(widget.dataset.secondsLeft);
      left = Math.max(0, left + seconds);
      widget.dataset.secondsLeft = left;
      updateTimerDisplay(id);
    }

    function adjustTimerVal(id, scope, amount) {
      const widget = document.getElementById(id);
      if (widget.dataset.isActive === "true") return;

      let left = parseInt(widget.dataset.secondsLeft);
      let mins = Math.floor(left / 60);
      let secs = left % 60;

      if (scope === 'min') {
        mins = Math.max(0, Math.min(99, mins + amount));
      } else {
        secs = secs + amount;
        if (secs >= 60) {
          secs = 0;
          mins = Math.min(99, mins + 1);
        } else if (secs < 0) {
          secs = 59;
          mins = Math.max(0, mins - 1);
        }
      }

      widget.dataset.secondsLeft = mins * 60 + secs;
      updateTimerDisplay(id);
    }

    // --- PAUSE/PLAY TOGGLES ---
    function toggleTimer(id) {
      const widget = document.getElementById(id);
      const isAct = widget.dataset.isActive === "true";

      if (isAct) {
        // Pause
        widget.dataset.isActive = "false";
        clearInterval(widget.timerInterval);
        widget.querySelector('.timer-play-txt').innerText = "Start";
        widget.querySelector('.timer-play-btn').className = "timer-play-btn flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition bg-emerald-600 hover:bg-emerald-500 text-white";
        widget.querySelectorAll('.timer-arrow').forEach(btn => btn.removeAttribute('disabled'));
      } else {
        // Start
        widget.dataset.isActive = "true";
        widget.querySelectorAll('.timer-arrow').forEach(btn => btn.setAttribute('disabled', 'true'));
        widget.querySelector('.timer-play-txt').innerText = "Pause";
        widget.querySelector('.timer-play-btn').className = "timer-play-btn flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition bg-amber-600 hover:bg-amber-500 text-white";
        
        widget.timerInterval = setInterval(() => {
          let left = parseInt(widget.dataset.secondsLeft);
          if (left > 0) {
            left--;
            widget.dataset.secondsLeft = left;
            updateTimerDisplay(id);

            // Pulse warning if less than 30 seconds
            if (left < 30) {
              widget.querySelector('.timer-min').classList.add('text-red-400', 'animate-pulse');
              widget.querySelector('.timer-sec').classList.add('text-red-400', 'animate-pulse');
            }
          } else {
            // Alarm finish
            clearInterval(widget.timerInterval);
            widget.dataset.isActive = "false";
            playBuzzer('bell');
            resetTimer(id);
          }
        }, 1000);
      }
    }

    function resetTimer(id) {
      const widget = document.getElementById(id);
      clearInterval(widget.timerInterval);
      widget.dataset.isActive = "false";
      widget.dataset.secondsLeft = 300; // Reset to 5m
      updateTimerDisplay(id);
      widget.querySelector('.timer-play-txt').innerText = "Start";
      widget.querySelector('.timer-play-btn').className = "timer-play-btn flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition bg-emerald-600 hover:bg-emerald-500 text-white";
      widget.querySelectorAll('.timer-arrow').forEach(btn => btn.removeAttribute('disabled'));
    }

    function updateTimerDisplay(id) {
      const widget = document.getElementById(id);
      const left = parseInt(widget.dataset.secondsLeft);
      const mins = Math.floor(left / 60);
      const secs = left % 60;

      const minDisplay = widget.querySelector('.timer-min');
      const secDisplay = widget.querySelector('.timer-sec');

      minDisplay.innerText = String(mins).padStart(2, '0');
      secDisplay.innerText = String(secs).padStart(2, '0');

      if (left >= 30) {
        minDisplay.className = "text-5xl font-mono font-bold tracking-widest text-slate-100 timer-min";
        secDisplay.className = "text-5xl font-mono font-bold tracking-widest text-slate-100 timer-sec";
      }
    }

    // --- STOPWATCH ACTIONS ---
    function toggleStopwatch(id) {
      const widget = document.getElementById(id);
      const isAct = widget.dataset.isActive === "true";

      if (isAct) {
        widget.dataset.isActive = "false";
        clearInterval(widget.swInterval);
        widget.querySelector('.sw-play-txt').innerText = "Start";
        widget.querySelector('.sw-play-btn').className = "sw-play-btn flex items-center space-x-1 px-3 py-1.5 rounded-lg text-xs font-bold transition bg-emerald-600 hover:bg-emerald-500 text-white";
      } else {
        widget.dataset.isActive = "true";
        widget.querySelector('.sw-play-txt').innerText = "Stop";
        widget.querySelector('.sw-play-btn').className = "sw-play-btn flex items-center space-x-1 px-3 py-1.5 rounded-lg text-xs font-bold transition bg-amber-600 hover:bg-amber-500 text-white";
        
        const startTime = Date.now() - parseInt(widget.dataset.time);
        widget.swInterval = setInterval(() => {
          const current = Date.now() - startTime;
          widget.dataset.time = current;

          const minutes = Math.floor((current / 60000) % 60);
          const seconds = Math.floor((current / 1000) % 60);
          const milliseconds = Math.floor((current / 10) % 100);

          widget.querySelector('.sw-min').innerText = String(minutes).padStart(2, '0');
          widget.querySelector('.sw-sec').innerText = String(seconds).padStart(2, '0');
          widget.querySelector('.sw-ms').innerText = String(milliseconds).padStart(2, '0');
        }, 10);
      }
    }

    function resetStopwatch(id) {
      const widget = document.getElementById(id);
      clearInterval(widget.swInterval);
      widget.dataset.isActive = "false";
      widget.dataset.time = 0;

      widget.querySelector('.sw-min').innerText = "00";
      widget.querySelector('.sw-sec').innerText = "00";
      widget.querySelector('.sw-ms').innerText = "00";

      widget.querySelector('.sw-play-txt').innerText = "Start";
      widget.querySelector('.sw-play-btn').className = "sw-play-btn flex items-center space-x-1 px-3 py-1.5 rounded-lg text-xs font-bold transition bg-emerald-600 hover:bg-emerald-500 text-white";
    }

    // --- TRAFFIC LIGHT ACTIONS ---
    function setLightColor(id, color) {
      const widget = document.getElementById(id);
      const redBtn = widget.querySelector('.light-red');
      const yelBtn = widget.querySelector('.light-yellow');
      const grnBtn = widget.querySelector('.light-green');

      redBtn.className = "light-red w-12 h-12 rounded-full transition-all duration-300 relative bg-red-950/70 hover:bg-red-900/40";
      yelBtn.className = "light-yellow w-12 h-12 rounded-full transition-all duration-300 relative bg-yellow-950/70 hover:bg-yellow-900/40";
      grnBtn.className = "light-green w-12 h-12 rounded-full transition-all duration-300 relative bg-emerald-950/70 hover:bg-emerald-900/40";

      if (color === 'red') {
        redBtn.className = "light-red w-12 h-12 rounded-full transition-all duration-300 relative bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)] scale-110";
      } else if (color === 'yellow') {
        yelBtn.className = "light-yellow w-12 h-12 rounded-full transition-all duration-300 relative bg-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.8)] scale-110";
      } else if (color === 'green') {
        grnBtn.className = "light-green w-12 h-12 rounded-full transition-all duration-300 relative bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.8)] scale-110";
      }
    }

    // --- WORK SYMBOLS ACTIONS ---
    const workSymbols = {
      silence: { label: 'Silence', icon: '🤫', desc: 'No talking allowed.', color: 'border-rose-500 bg-rose-500/10 text-rose-300' },
      whisper: { label: 'Whisper', icon: '🗣️', desc: 'Speak in a very low voice.', color: 'border-blue-500 bg-blue-500/10 text-blue-300' },
      ask: { label: 'Ask Neighbor', icon: '👥', desc: 'Ask a teammate near you.', color: 'border-yellow-500 bg-yellow-500/10 text-yellow-300' },
      collab: { label: 'Work Together', icon: '🤝', desc: 'Collaborate as groups.', color: 'border-emerald-500 bg-emerald-500/10 text-emerald-300' },
    };

    function setWorkSymbol(id, symbol) {
      const widget = document.getElementById(id);
      const container = widget.querySelector('.work-visual');
      const data = workSymbols[symbol];

      // Update contents
      widget.querySelector('.work-icon').innerText = data.icon;
      widget.querySelector('.work-title').innerText = data.label;
      widget.querySelector('.work-desc').innerText = data.desc;

      container.className = `work-visual p-3 rounded-xl border flex items-center space-x-3.5 transition duration-300 ${data.color}`;

      // Highlight active button selector
      const buttons = widget.querySelectorAll('.grid button');
      buttons.forEach(btn => {
        btn.className = "py-1.5 px-2 rounded-lg text-xs font-semibold text-center transition bg-slate-800 hover:bg-slate-700 text-slate-300";
      });
      const activeIdx = { silence: 0, whisper: 1, ask: 2, collab: 3 }[symbol];
      buttons[activeIdx].className = "py-1.5 px-2 rounded-lg text-xs font-semibold text-center transition bg-indigo-600 text-white";
    }

    // --- DRAWING CANVAS ACTIONS ---
    function setCanvasColor(id, color) {
      const widget = document.getElementById(id);
      const canvas = widget.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      ctx.strokeStyle = color;
      canvas.dataset.color = color;

      // Update indicator borders
      const buttons = widget.querySelectorAll('.drawing-colors button');
      buttons.forEach(btn => {
        btn.className = `w-4 h-4 rounded-full border border-transparent transition transform scale-100`;
      });
      const targetBtn = Array.from(buttons).find(b => b.style.backgroundColor === color || b.getAttribute('style').includes(color));
      if (targetBtn) {
        targetBtn.className = "w-4 h-4 rounded-full border border-white ring-1 ring-indigo-500 transition transform scale-125";
      }
    }

    function adjustBrush(id, delta) {
      const widget = document.getElementById(id);
      const canvas = widget.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      let currentSize = parseInt(canvas.dataset.brushSize) || 4;
      currentSize = Math.max(2, Math.min(16, currentSize + delta));
      canvas.dataset.brushSize = currentSize;
      ctx.lineWidth = currentSize;
      widget.querySelector('.brush-size-display').innerText = `${currentSize}px`;
    }

    function clearDrawboard(id) {
      const widget = document.getElementById(id);
      const canvas = widget.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath(); // Flush old vector coordinates
    }

    // --- DICE ACTIONS ---
    function setDiceCount(id, count) {
      const widget = document.getElementById(id);
      widget.dataset.diceCount = count;

      const buttons = widget.querySelectorAll('.dice-count-selectors button');
      buttons.forEach((btn, idx) => {
        if (idx + 1 === count) {
          btn.className = "w-6 h-6 rounded text-xs font-bold transition bg-indigo-600 text-white";
        } else {
          btn.className = "w-6 h-6 rounded text-xs font-bold transition bg-slate-800 hover:bg-slate-700 text-slate-300";
        }
      });

      // Redraw empty dice
      const diceWrapper = widget.querySelector('.dice-wrapper');
      diceWrapper.innerHTML = "";
      for (let i = 0; i < count; i++) {
        diceWrapper.innerHTML += `
          <div class="w-14 h-14 bg-white text-slate-950 rounded-xl flex items-center justify-center font-bold text-2xl shadow-xl transition-all duration-150 transform border-2 border-slate-300">1</div>
        `;
      }
      widget.querySelector('.dice-sum-display').classList.add('hidden');
    }

    function rollDice(id) {
      const widget = document.getElementById(id);
      const count = parseInt(widget.dataset.diceCount);
      const rolls = [];
      const dice = widget.querySelectorAll('.dice-wrapper div');

      let rollAnimationCount = 0;
      widget.querySelector('.roll-btn').setAttribute('disabled', 'true');
      widget.querySelector('.roll-txt').innerText = "Rolling...";

      const animationInterval = setInterval(() => {
        rolls.length = 0;
        dice.forEach(die => {
          const rand = Math.floor(Math.random() * 6) + 1;
          rolls.push(rand);
          die.innerText = rand;
          die.style.transform = `rotate(${Math.floor(Math.random() * 360)}deg) scale(0.9)`;
          die.style.opacity = "0.8";
        });
        rollAnimationCount++;

        if (rollAnimationCount > 8) {
          clearInterval(animationInterval);
          widget.querySelector('.roll-btn').removeAttribute('disabled');
          widget.querySelector('.roll-txt').innerText = "Roll Dice";

          // Final Placement
          let sum = 0;
          dice.forEach((die, idx) => {
            const finalVal = Math.floor(Math.random() * 6) + 1;
            sum += finalVal;
            die.innerText = finalVal;
            die.style.transform = "rotate(0deg) scale(1.0)";
            die.style.opacity = "1.0";
          });

          if (count > 1) {
            widget.querySelector('.sum-value').innerText = sum;
            widget.querySelector('.dice-sum-display').classList.remove('hidden');
          } else {
            widget.querySelector('.dice-sum-display').classList.add('hidden');
          }
        }
      }, 65);
    }

    // --- PICKER ACTIONS ---
    function pickWinner(id) {
      const widget = document.getElementById(id);
      const namesInput = widget.querySelector('.picker-input').value;
      const list = namesInput.split('\n').map(n => n.trim()).filter(n => n.length > 0);

      if (list.length === 0) {
        alert("Please add some student names first!");
        return;
      }

      widget.querySelector('.picker-input-wrapper').classList.add('hidden');
      const resultWrap = widget.querySelector('.picker-result-wrapper');
      resultWrap.classList.remove('hidden');

      const status = resultWrap.querySelector('.picker-status');
      const winner = resultWrap.querySelector('.picker-winner');

      status.innerText = "Selecting...";
      status.classList.add('animate-pulse');

      let animCount = 0;
      const interval = setInterval(() => {
        winner.innerText = list[Math.floor(Math.random() * list.length)];
        winner.style.transform = "scale(0.9)";
        winner.style.opacity = "0.7";
        animCount++;

        if (animCount > 15) {
          clearInterval(interval);
          status.innerText = "🎉 Selected Student 🎉";
          status.classList.remove('animate-pulse');
          const finalW = list[Math.floor(Math.random() * list.length)];
          winner.innerText = finalW;
          winner.style.transform = "scale(1.1)";
          winner.style.opacity = "1.0";
        }
      }, 100);
    }

    function resetPicker(id) {
      const widget = document.getElementById(id);
      widget.querySelector('.picker-input-wrapper').classList.remove('hidden');
      widget.querySelector('.picker-result-wrapper').classList.add('hidden');
    }

    // --- SOUND ANALYZER MIC ACTIONS ---
    async function toggleMicrophone(id) {
      const widget = document.getElementById(id);
      const isCapturing = widget.dataset.streamId ? true : false;

      if (isCapturing) {
        stopMicrophoneCapture(id);
      } else {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          widget.dataset.streamId = "active";
          micStream = stream;

          const context = new (window.AudioContext || window.webkitAudioContext)();
          const analyser = context.createAnalyser();
          analyser.fftSize = 256;

          const source = context.createMediaStreamSource(stream);
          source.connect(analyser);

          widget.audioCtx = context;
          widget.analyser = analyser;
          widget.micSource = source;

          const bufferLength = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufferLength);

          widget.querySelector('.sound-disabled-msg').classList.add('hidden');
          widget.querySelector('.sound-active-panel').classList.remove('hidden');
          widget.querySelector('.sound-slider-wrapper').classList.remove('hidden');

          const btn = widget.querySelector('.mic-toggle-btn');
          btn.className = "mic-toggle-btn w-full py-1.5 px-3 rounded-lg text-xs font-bold uppercase tracking-wider transition flex justify-center items-center gap-1.5 bg-rose-600 text-white hover:bg-rose-500";
          widget.querySelector('.mic-toggle-txt').innerText = "Disable Meter";

          // Sound Analysis Loop
          function monitor() {
            if (!widget.analyser) return;
            widget.analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
              sum += dataArray[i];
            }
            const average = sum / bufferLength;
            const normalized = Math.min(Math.round((average / 128) * 100), 100);

            widget.querySelector('.noise-readout').innerText = `${normalized}%`;
            widget.querySelector('.noise-meter-bar').style.width = `${normalized}%`;

            const limit = parseInt(widget.dataset.limit || 70);
            const warningAlert = widget.querySelector('.noise-warning');

            if (normalized > limit) {
              warningAlert.classList.remove('hidden');
              widget.querySelector('.noise-meter-bar').className = "noise-meter-bar h-full transition-all duration-75 rounded-full bg-gradient-to-r from-red-500 to-rose-600";
            } else {
              warningAlert.classList.add('hidden');
              widget.querySelector('.noise-meter-bar').className = "noise-meter-bar h-full transition-all duration-75 rounded-full bg-gradient-to-r from-teal-500 to-emerald-500";
            }

            widget.rafId = requestAnimationFrame(monitor);
          }
          monitor();

        } catch (err) {
          console.error("Microphone access blocked or failed", err);
          alert("Unable to access mic. Please grant microphone permission.");
        }
      }
    }

    function stopMicrophoneCapture(id) {
      const widget = document.getElementById(id);
      if (widget.rafId) cancelAnimationFrame(widget.rafId);
      
      if (widget.micSource && widget.micSource.mediaStream) {
        widget.micSource.mediaStream.getTracks().forEach(track => track.stop());
      }
      if (widget.audioCtx) {
        widget.audioCtx.close();
      }

      widget.analyser = null;
      widget.micSource = null;
      widget.audioCtx = null;
      delete widget.dataset.streamId;

      widget.querySelector('.sound-disabled-msg').classList.remove('hidden');
      widget.querySelector('.sound-active-panel').classList.add('hidden');
      widget.querySelector('.sound-slider-wrapper').classList.add('hidden');

      const btn = widget.querySelector('.mic-toggle-btn');
      btn.className = "mic-toggle-btn w-full py-1.5 px-3 rounded-lg text-xs font-bold uppercase tracking-wider transition flex justify-center items-center gap-1.5 bg-teal-500 text-slate-950 hover:bg-teal-400";
      widget.querySelector('.mic-toggle-txt').innerText = "Enable Noise Meter";
    }

    function updateSoundLimit(id, val) {
      const widget = document.getElementById(id);
      widget.dataset.limit = val;
      widget.querySelector('.noise-limit-display').innerText = `${val}%`;
      widget.querySelector('.noise-limit-line').style.left = `${val}%`;
    }

    // --- QR CODE GENERATION ---
    function updateQrCode(id) {
      const widget = document.getElementById(id);
      const text = widget.querySelector('.qr-input').value;
      if (!text.trim()) return;
      widget.querySelector('.qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(text)}`;
    }

    // --- INIT APP LAUNCHER ---
    window.onload = function () {
      buildThemeSelectorMenu();
      
      // Select a random backdrop type and choice on boot
      const backdropTypes = ['gradient', 'image', 'color'];
      const randomType = backdropTypes[Math.floor(Math.random() * backdropTypes.length)];
      let randomValue = '';

      if (randomType === 'gradient') {
        const choice = gradients[Math.floor(Math.random() * gradients.length)];
        randomValue = choice.value;
      } else if (randomType === 'image') {
        const choice = images[Math.floor(Math.random() * images.length)];
        randomValue = choice.url;
      } else if (randomType === 'color') {
        const choice = colors[Math.floor(Math.random() * colors.length)];
        randomValue = choice.value;
      }

      setBackground(randomType, randomValue);

      // Start with a completely blank screen (no initial widgets spawned)

      // Fade splash screen out safely
      setTimeout(() => {
        document.getElementById('splash-text').innerText = "Preparing blank interactive workspace...";
      }, 1200);

      setTimeout(() => {
        const splash = document.getElementById('app-splash');
        if (splash) {
          splash.classList.add('opacity-0', 'pointer-events-none');
          setTimeout(() => splash.remove(), 700);
        }
      }, 2500);
    };
  </script>
</body>
