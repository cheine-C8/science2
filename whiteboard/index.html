<!-- ===================================================================================== -->
<!-- BASIC HTML SETUP -->
<!-- ===================================================================================== -->

<!-- This tells the browser we are using HTML5 -->
<!DOCTYPE html>

<!-- Main HTML document -->
<html lang="en">

<head>

    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the app work well on phones/tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Browser tab title -->
    <title>Infinite Whiteboard</title>

    <!-- Tailwind CSS library for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide icon library -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ================================================================================= -->
    <!-- CSS STYLES -->
    <!-- ================================================================================= -->
    <style>

        /* Remove margins and make page full screen */
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;

            /* Prevent weird scrolling behavior */
            overscroll-behavior: none;

            /* Default font */
            font-family: 'Segoe UI', system-ui, sans-serif;

            /* Prevent text highlighting while drawing */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Main whiteboard background */
        #canvas-container {
            position: absolute;
            inset: 0;

            /* Light gray background */
            background-color: #f8fafc;

            /* Creates dotted grid */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 40px 40px;

            /* Needed for touch drawing */
            touch-action: none;
        }

        /* Both canvases fill the screen */
        canvas {
            position: absolute;
            inset: 0;
            display: block;

            touch-action: none;
            -webkit-touch-callout: none;
        }

        /* Main drawing layer */
        #mainCanvas {
            z-index: 10;
        }

        /* Temporary preview layer */
        #overlayCanvas {
            z-index: 20;
            cursor: crosshair;
        }

        /* Active toolbar button style */
        .tool-btn.active {
            background-color: #2563eb;
            color: white;
        }

        /* Active color button */
        .color-btn.active {
            transform: scale(1.25);
        }

    </style>
</head>

<body>

    <!-- ================================================================================= -->
    <!-- CANVAS AREA -->
    <!-- ================================================================================= -->

    <div id="canvas-container">

        <!-- Permanent drawing canvas -->
        <canvas id="mainCanvas"></canvas>

        <!-- Temporary preview canvas -->
        <canvas id="overlayCanvas"></canvas>

    </div>

    <!-- ================================================================================= -->
    <!-- TOOLBAR -->
    <!-- ================================================================================= -->

    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-white p-2 rounded-xl flex gap-2">

        <!-- Pen Tool -->
        <button id="btn-pen" class="tool-btn active">
            Pen
        </button>

        <!-- Eraser Tool -->
        <button id="btn-eraser" class="tool-btn">
            Eraser
        </button>

        <!-- Rectangle Tool -->
        <button id="btn-rect" class="tool-btn">
            Rectangle
        </button>

        <!-- Circle Tool -->
        <button id="btn-circle" class="tool-btn">
            Circle
        </button>

    </div>

    <!-- ================================================================================= -->
    <!-- JAVASCRIPT -->
    <!-- ================================================================================= -->

    <script type="module">

        // ================================================================================
        // FIREBASE IMPORTS
        // ================================================================================

        // Import Firebase tools
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        import {
            getAuth,
            signInAnonymously,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        import {
            getFirestore
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";


        // ================================================================================
        // ICON SETUP
        // ================================================================================

        // Creates all Lucide icons
        lucide.createIcons();


        // ================================================================================
        // APP STATE VARIABLES
        // ================================================================================

        // Stores current tool settings
        const ui = {

            // Current selected tool
            tool: 'pen',

            // Pen thickness
            thickness: 3,

            // Current color
            color: '#000000',

            // Grid visibility
            showGrid: true
        };

        // Stores camera position and zoom
        const view = {
            x: 0,
            y: 0,
            zoom: 1
        };

        // Stores all finished drawings
        let strokes = [];

        // Tracks if screen needs redraw
        let isDirty = true;

        // Tracks active pointers/fingers
        const activePointers = new Map();

        // True while drawing
        let isDrawing = false;

        // Current line/shape being drawn
        let currentStroke = null;


        // ================================================================================
        // CANVAS SETUP
        // ================================================================================

        // Get canvas elements from HTML
        const mainCanvas = document.getElementById('mainCanvas');
        const overlayCanvas = document.getElementById('overlayCanvas');

        // Get drawing contexts
        const mainCtx = mainCanvas.getContext('2d');
        const overlayCtx = overlayCanvas.getContext('2d');

        // Resize canvases to fit screen
        function resize() {

            mainCanvas.width = window.innerWidth;
            mainCanvas.height = window.innerHeight;

            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;

            isDirty = true;
        }

        // Run resize on startup
        resize();

        // Resize when browser window changes
        window.addEventListener('resize', resize);


        // ================================================================================
        // FIREBASE SETUP
        // ================================================================================

        // Firebase configuration
        const firebaseConfig = {

            apiKey: "YOUR_API_KEY",

            authDomain: "YOUR_DOMAIN",

            projectId: "YOUR_PROJECT_ID"
        };

        // Start Firebase app
        const app = initializeApp(firebaseConfig);

        // Enable Firebase Authentication
        const auth = getAuth(app);

        // Enable Firestore Database
        const db = getFirestore(app);

        // Stores logged-in user
        let user = null;

        // Sign in anonymously
        signInAnonymously(auth);

        // Runs whenever login state changes
        onAuthStateChanged(auth, u => {

            user = u;

            console.log("Logged in:", user);

        });


        // ================================================================================
        // HELPER FUNCTIONS
        // ================================================================================

        // Converts mouse/touch position into canvas coordinates
        function getCanvasPoint(clientX, clientY) {

            const rect = overlayCanvas.getBoundingClientRect();

            return {
                x: ((clientX - rect.left) - view.x) / view.zoom,
                y: ((clientY - rect.top) - view.y) / view.zoom
            };
        }


        // ================================================================================
        // DRAWING FUNCTIONS
        // ================================================================================

        // Draws smooth freehand line
        function drawSmoothPath(ctx, points, color, thickness) {

            // Stop if there are no points
            if (!points || points.length === 0) return;

            ctx.beginPath();

            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;

            // Rounded edges
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Start at first point
            ctx.moveTo(points[0].x, points[0].y);

            // Draw line through all points
            for (let i = 1; i < points.length; i++) {

                ctx.lineTo(points[i].x, points[i].y);
            }

            ctx.stroke();
        }


        // Draws rectangle
        function drawRect(ctx, p1, p2, color, thickness) {

            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;

            ctx.beginPath();

            ctx.rect(
                Math.min(p1.x, p2.x),
                Math.min(p1.y, p2.y),
                Math.abs(p2.x - p1.x),
                Math.abs(p2.y - p1.y)
            );

            ctx.stroke();
        }


        // Draws ellipse/circle
        function drawCircle(ctx, p1, p2, color, thickness) {

            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;

            ctx.beginPath();

            ctx.ellipse(
                (p1.x + p2.x) / 2,
                (p1.y + p2.y) / 2,
                Math.abs(p2.x - p1.x) / 2,
                Math.abs(p2.y - p1.y) / 2,
                0,
                0,
                2 * Math.PI
            );

            ctx.stroke();
        }


        // Draws any type of object
        function drawEntity(ctx, stroke) {

            // Pen tool
            if (stroke.type === 'pen') {

                drawSmoothPath(
                    ctx,
                    stroke.points,
                    stroke.color,
                    stroke.thickness
                );
            }

            // Rectangle tool
            else if (stroke.type === 'rect') {

                drawRect(
                    ctx,
                    stroke.points[0],
                    stroke.points[1],
                    stroke.color,
                    stroke.thickness
                );
            }

            // Circle tool
            else if (stroke.type === 'circle') {

                drawCircle(
                    ctx,
                    stroke.points[0],
                    stroke.points[1],
                    stroke.color,
                    stroke.thickness
                );
            }
        }


        // ================================================================================
        // SCREEN REDRAW
        // ================================================================================

        // Redraws all strokes
        function redrawMain() {

            // Clear canvas
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

            // Draw every saved stroke
            for (const stroke of strokes) {

                drawEntity(mainCtx, stroke);
            }
        }


        // Animation loop
        function renderLoop() {

            // Only redraw when needed
            if (isDirty) {

                redrawMain();

                isDirty = false;
            }

            requestAnimationFrame(renderLoop);
        }

        // Start render loop
        requestAnimationFrame(renderLoop);


        // ================================================================================
        // POINTER EVENTS
        // ================================================================================

        // Start drawing
        overlayCanvas.addEventListener('pointerdown', e => {

            isDrawing = true;

            // Get canvas coordinates
            const pt = getCanvasPoint(e.clientX, e.clientY);

            // Create new stroke object
            currentStroke = {

                id: crypto.randomUUID(),

                type: ui.tool,

                color: ui.color,

                thickness: ui.thickness,

                points: [pt]
            };
        });


        // Continue drawing
        overlayCanvas.addEventListener('pointermove', e => {

            if (!isDrawing || !currentStroke) return;

            const pt = getCanvasPoint(e.clientX, e.clientY);

            // Add point to stroke
            currentStroke.points.push(pt);

            // Clear preview layer
            overlayCtx.clearRect(
                0,
                0,
                overlayCanvas.width,
                overlayCanvas.height
            );

            // Draw preview
            drawEntity(overlayCtx, currentStroke);
        });


        // Finish drawing
        overlayCanvas.addEventListener('pointerup', e => {

            if (!currentStroke) return;

            // Save finished stroke
            strokes.push(currentStroke);

            // Clear preview layer
            overlayCtx.clearRect(
                0,
                0,
                overlayCanvas.width,
                overlayCanvas.height
            );

            // Reset drawing state
            currentStroke = null;
            isDrawing = false;

            // Redraw screen
            isDirty = true;
        });


        // ================================================================================
        // TOOLBAR BUTTONS
        // ================================================================================

        // Changes selected tool
        function switchTool(toolName) {

            ui.tool = toolName;

            console.log("Tool changed to:", toolName);
        }

        // Pen button
        document.getElementById('btn-pen').onclick = () => {

            switchTool('pen');
        };

        // Eraser button
        document.getElementById('btn-eraser').onclick = () => {

            switchTool('eraser');
        };

        // Rectangle button
        document.getElementById('btn-rect').onclick = () => {

            switchTool('rect');
        };

        // Circle button
        document.getElementById('btn-circle').onclick = () => {

            switchTool('circle');
        };

    </script>

</body>

</html>
