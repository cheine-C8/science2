<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke of the Day Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #3b82f6;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="max-w-md w-full glass-panel rounded-3xl shadow-2xl overflow-hidden transform transition-all">
        <!-- Header -->
        <div class="bg-white/50 px-8 py-6 border-b border-white/20">
            <h1
                class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center gap-3">
                <i class="fas fa-laugh-squint text-indigo-500"></i>
                Joke Automator
            </h1>
            <p class="text-sm text-slate-600 mt-1 font-medium">Control the daily joke insertion.</p>
        </div>

        <!-- Content -->
        <div class="px-8 py-8 space-y-8">

            <!-- Manual Trigger Section -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-700">Manual Trigger</h2>
                    <span id="statusBadge"
                        class="px-2 py-1 rounded-full text-xs font-bold bg-slate-200 text-slate-500 uppercase tracking-wide">Ready</span>
                </div>

                <button id="insertBtn" onclick="triggerJokeInsertion()"
                    class="w-full relative group overflow-hidden rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                    <div class="absolute inset-0 w-full h-full bg-white/20 group-hover:bg-transparent transition-all">
                    </div>
                    <div class="px-6 py-4 flex items-center justify-center gap-3 font-bold text-lg">
                        <i id="btnIcon" class="fas fa-bolt"></i>
                        <span id="btnText">Insert Today's Joke Now</span>
                    </div>
                </button>

                <!-- Joke Display Area -->
                <div id="jokeResult" class="hidden mt-4 p-5 bg-white/60 rounded-xl border border-white/40 shadow-inner">
                    <h3 class="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-2">Successfully Inserted:
                    </h3>
                    <p id="setupText" class="font-medium text-slate-800 text-lg"></p>
                    <p id="punchlineText" class="mt-2 text-slate-600 italic"></p>
                </div>
            </div>

            <hr class="border-white/40">

            <!-- Automatic Trigger Section -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
                            <i class="fas fa-clock text-pink-500"></i> Auto-Insert Daily
                        </h2>
                        <p class="text-xs text-slate-500 mt-1">Runs automatically at 6:00 AM every day.</p>
                    </div>

                    <!-- Toggle Switch -->
                    <div
                        class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="autoToggle" onchange="toggleAutoRun()"
                            class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10 top-0 left-0" />
                        <label for="autoToggle"
                            class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>
            </div>

            <!-- Error Message Area -->
            <div id="errorBox"
                class="hidden bg-red-100 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium">
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // REPLACE THIS URL AFTER DEPLOYING APPS SCRIPT
        // ==========================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_gv1943LtaJrFTXSNIiulgSQcuHHoULZDrWRxElQyte50KOSvBs5AJpcE1lKHsRw/exec";

        const insertBtn = document.getElementById('insertBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const statusBadge = document.getElementById('statusBadge');
        const errorBox = document.getElementById('errorBox');
        const jokeResult = document.getElementById('jokeResult');
        const setupText = document.getElementById('setupText');
        const punchlineText = document.getElementById('punchlineText');
        const autoToggle = document.getElementById('autoToggle');

        // Check current toggle status on load
        window.addEventListener('DOMContentLoaded', async () => {
            if (APPS_SCRIPT_URL === "YOUR_WEB_APP_URL_HERE") {
                showError("Please replace YOUR_WEB_APP_URL_HERE in the code with your deployed Apps Script URL.");
                return;
            }

            try {
                // Using a trick: fetch with POST to get status to avoid CORS preflight issues
                const formData = new URLSearchParams();
                formData.append('action', 'getStatus');

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const data = await response.json();
                if (data.success) {
                    autoToggle.checked = data.autoEnabled;
                }
            } catch (err) {
                console.error("Failed to fetch initial status:", err);
            }
        });

        async function triggerJokeInsertion() {
            if (APPS_SCRIPT_URL === "YOUR_WEB_APP_URL_HERE") {
                showError("Setup Required: Update the Apps Script URL in index.html first.");
                return;
            }

            // Set loading state
            insertBtn.disabled = true;
            btnText.innerText = "Processing...";
            btnIcon.className = "fas fa-spinner fa-spin";
            statusBadge.innerText = "Working";
            statusBadge.className = "px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-600 uppercase tracking-wide";
            hideError();
            jokeResult.classList.add('hidden');

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'insertJoke');

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const data = await response.json();

                if (data.success) {
                    // Success UI
                    statusBadge.innerText = "Success";
                    statusBadge.className = "px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600 uppercase tracking-wide";

                    // Show joke
                    setupText.innerText = data.joke.setup;
                    punchlineText.innerText = data.joke.punchline;
                    jokeResult.classList.remove('hidden');
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                // Error UI
                statusBadge.innerText = "Failed";
                statusBadge.className = "px-2 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600 uppercase tracking-wide";
                showError(err.message || "Network error. Make sure your Apps Script URL is correct.");
            } finally {
                // Reset button
                insertBtn.disabled = false;
                btnText.innerText = "Insert Today's Joke Now";
                btnIcon.className = "fas fa-bolt";
            }
        }

        async function toggleAutoRun() {
            if (APPS_SCRIPT_URL === "YOUR_WEB_APP_URL_HERE") {
                autoToggle.checked = !autoToggle.checked; // Revert
                showError("Setup Required: Update the Apps Script URL in index.html first.");
                return;
            }

            const isEnabled = autoToggle.checked;
            autoToggle.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'toggleAuto');
                formData.append('enable', isEnabled);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }
            } catch (err) {
                autoToggle.checked = !isEnabled; // Revert on failure
                showError("Failed to update auto-run setting: " + err.message);
            } finally {
                autoToggle.disabled = false;
            }
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }

        function hideError() {
            errorBox.classList.add('hidden');
        }
    </script>
</body>

</html>
