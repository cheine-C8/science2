<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molar Mass Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .formula-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .element-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .element-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Molar Mass Calculator</h1>
            <p class="text-slate-600 mt-2">Enter a chemical formula to see the step-by-step breakdown.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Input & Results -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Input Card -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <label for="formula" class="block text-sm font-semibold text-slate-700 mb-2">Chemical Formula</label>
                    <input 
                        type="text" 
                        id="formula" 
                        placeholder="e.g., H2O, H2SO4, Ca(OH)2" 
                        class="formula-input w-full p-4 text-xl border border-slate-300 rounded-xl transition-all"
                    >
                    <div id="error-msg" class="text-red-500 text-sm mt-2 hidden"></div>
                    <div class="mt-4 flex flex-wrap gap-2">
                        <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Try these:</span>
                        <button onclick="setFormula('C6H12O6')" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm text-slate-600">Glucose</button>
                        <button onclick="setFormula('NaCl')" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm text-slate-600">Table Salt</button>
                        <button onclick="setFormula('Mg3(PO4)2')" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-sm text-slate-600">Magnesium Phosphate</button>
                    </div>
                </div>

                <!-- Result Card -->
                <div id="result-container" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
                    <div class="flex justify-between items-end border-bottom border-slate-100 pb-4 mb-4">
                        <div>
                            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Total Molar Mass</h2>
                            <p id="total-mass" class="text-4xl font-bold text-blue-600">0.00 <span class="text-lg font-normal text-slate-400">g/mol</span></p>
                        </div>
                        <div class="text-right">
                            <span id="formula-display" class="text-2xl font-semibold text-slate-700"></span>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 text-xs uppercase tracking-wider">
                                    <th class="pb-3 font-semibold">Element</th>
                                    <th class="pb-3 font-semibold">Atoms</th>
                                    <th class="pb-3 font-semibold">Atomic Mass</th>
                                    <th class="pb-3 font-semibold text-right">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="breakdown-body" class="text-slate-700">
                                <!-- Dynamic Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Column: Quick Reference -->
            <div class="space-y-6">
                <div class="bg-slate-800 p-6 rounded-2xl text-white shadow-lg">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.333 0 4 .667 4 2V15H7v-1c0-1.333 2.667-2 4-2z"></path></svg>
                        Common Elements
                    </h3>
                    <div class="grid grid-cols-2 gap-3 text-xs" id="quick-ref">
                        <!-- Populated by JS -->
                    </div>
                    <p class="mt-6 text-slate-400 text-[10px] leading-relaxed italic">
                        Calculations use standard IUPAC atomic weights rounded to two decimal places.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data source: Atomic weights rounded to the hundredth place
        const atomicWeights = {
            "H": 1.01, "He": 4.00, "Li": 6.94, "Be": 9.01, "B": 10.81, "C": 12.01, "N": 14.01, "O": 16.00, "F": 19.00, "Ne": 20.18,
            "Na": 22.99, "Mg": 24.31, "Al": 26.98, "Si": 28.09, "P": 30.97, "S": 32.06, "Cl": 35.45, "Ar": 39.95, "K": 39.10, "Ca": 40.08,
            "Sc": 44.96, "Ti": 47.87, "V": 50.94, "Cr": 52.00, "Mn": 54.94, "Fe": 55.85, "Co": 58.93, "Ni": 58.69, "Cu": 63.55, "Zn": 65.38,
            "Ga": 69.72, "Ge": 72.63, "As": 74.92, "Se": 78.97, "Br": 79.90, "Kr": 83.80, "Rb": 85.47, "Sr": 87.62, "Y": 88.91, "Zr": 91.22,
            "Nb": 92.91, "Mo": 95.95, "Tc": 98.00, "Ru": 101.07, "Rh": 102.91, "Pd": 106.42, "Ag": 107.87, "Cd": 112.41, "In": 114.82, "Sn": 118.71,
            "Sb": 121.76, "Te": 127.60, "I": 126.90, "Xe": 131.29, "Cs": 132.91, "Ba": 137.33, "La": 138.91, "Ce": 140.12, "Pr": 140.91, "Nd": 144.24,
            "Pm": 145.00, "Sm": 150.36, "Eu": 151.96, "Gd": 157.25, "Tb": 158.93, "Dy": 162.50, "Ho": 164.93, "Er": 167.26, "Tm": 168.93, "Yb": 173.05,
            "Lu": 174.97, "Hf": 178.49, "Ta": 180.95, "W": 183.84, "Re": 186.21, "Os": 190.23, "Ir": 192.22, "Pt": 195.08, "Au": 196.97, "Hg": 200.59,
            "Tl": 204.38, "Pb": 207.20, "Bi": 208.98, "Po": 209.00, "At": 210.00, "Rn": 222.00, "Fr": 223.00, "Ra": 226.00, "Ac": 227.00, "Th": 232.04, "Pa": 231.04,
            "U": 238.03, "Np": 237.00, "Pu": 244.00, "Am": 243.00, "Cm": 247.00, "Bk": 247.00, "Cf": 251.00, "Es": 252.00, "Fm": 257.00, "Md": 258.00, "No": 259.00, "Lr": 262.00,
            "Rf": 267.00, "Db": 270.00, "Sg": 271.00, "Bh": 270.00, "Hs": 277.00, "Mt": 276.00, "Ds": 281.00, "Rg": 280.00, "Cn": 285.00, "Nh": 284.00, "Fl": 289.00, "Mc": 288.00,
            "Lv": 293.00, "Ts": 294.00, "Og": 294.00
        };

        const commonOnes = ["H", "C", "N", "O", "Na", "Mg", "Al", "P", "S", "Cl", "K", "Ca", "Fe", "Cu"];

        function init() {
            const refDiv = document.getElementById('quick-ref');
            commonOnes.forEach(sym => {
                const card = document.createElement('div');
                card.className = 'bg-slate-700 p-2 rounded flex justify-between items-center border border-slate-600';
                card.innerHTML = `<span class="font-bold text-blue-300">${sym}</span> <span>${atomicWeights[sym].toFixed(2)}</span>`;
                refDiv.appendChild(card);
            });

            document.getElementById('formula').addEventListener('input', (e) => {
                calculate(e.target.value);
            });
        }

        function setFormula(val) {
            const input = document.getElementById('formula');
            input.value = val;
            calculate(val);
        }

        function parseFormula(formula) {
            const counts = {};
            const stack = [{}];
            const regex = /([A-Z][a-z]*)(\d*)|(\()|(\))(\d*)/g;
            let match;

            while ((match = regex.exec(formula)) !== null) {
                const [full, symbol, count, openParen, closeParen, parenCount] = match;

                if (symbol) {
                    if (!atomicWeights[symbol]) throw new Error(`Unknown element: ${symbol}`);
                    const n = parseInt(count) || 1;
                    const currentFrame = stack[stack.length - 1];
                    currentFrame[symbol] = (currentFrame[symbol] || 0) + n;
                } else if (openParen) {
                    stack.push({});
                } else if (closeParen) {
                    const multiplier = parseInt(parenCount) || 1;
                    const nested = stack.pop();
                    const currentFrame = stack[stack.length - 1];
                    for (const sym in nested) {
                        currentFrame[sym] = (currentFrame[sym] || 0) + (nested[sym] * multiplier);
                    }
                }
            }

            if (stack.length !== 1) throw new Error("Unbalanced parentheses");
            return stack[0];
        }

        function calculate(formula) {
            const resultContainer = document.getElementById('result-container');
            const errorMsg = document.getElementById('error-msg');
            const breakdownBody = document.getElementById('breakdown-body');
            const totalMassEl = document.getElementById('total-mass');
            const formulaDisplay = document.getElementById('formula-display');

            if (!formula.trim()) {
                resultContainer.classList.add('hidden');
                errorMsg.classList.add('hidden');
                return;
            }

            try {
                const elementCounts = parseFormula(formula);
                let total = 0;
                breakdownBody.innerHTML = '';

                Object.keys(elementCounts).sort().forEach(sym => {
                    const count = elementCounts[sym];
                    const weight = atomicWeights[sym];
                    const subtotal = count * weight;
                    total += subtotal;

                    const row = document.createElement('tr');
                    row.className = 'border-t border-slate-50';
                    row.innerHTML = `
                        <td class="py-4"><span class="font-bold text-slate-900">${sym}</span></td>
                        <td class="py-4 text-slate-500">${count}</td>
                        <td class="py-4 text-slate-500">${weight.toFixed(2)}</td>
                        <td class="py-4 text-right font-medium text-slate-900">${subtotal.toFixed(2)}</td>
                    `;
                    breakdownBody.appendChild(row);
                });

                totalMassEl.innerHTML = `${total.toFixed(2)} <span class="text-lg font-normal text-slate-400">g/mol</span>`;
                formulaDisplay.textContent = formula;
                
                resultContainer.classList.remove('hidden');
                errorMsg.classList.add('hidden');
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                resultContainer.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
